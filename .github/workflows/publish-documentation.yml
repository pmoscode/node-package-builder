name: Deploy Documentation Pages

on:
  workflow_run:
    types:
      - completed
    workflows:
      - Publish to NPM
  workflow_dispatch:
    inputs:
      source:
        description: 'Deploy from tag or master?'
        type: choice
        required: true
        default: 'master'
        options:
          - master
          - tag
      tag:
        description: 'Git Tag to deploy (e.g. v1.2.1) - only used when source is "tag"'
        type: string
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Validate inputs
        if: github.event_name == 'workflow_dispatch' && inputs.source == 'tag' && inputs.tag == ''
        run: |
          echo "::error::You selected source 'tag' but did not provide a tag name."
          exit 1

      - name: Validate tag exists
        if: github.event_name == 'workflow_dispatch' && inputs.source == 'tag'
        run: |
          git ls-remote --tags "${{ github.server_url }}/${{ github.repository }}.git" "refs/tags/${{ inputs.tag }}" | grep -q "${{ inputs.tag }}" \
            || (echo "::error::Tag '${{ inputs.tag }}' does not exist in the repository." && exit 1)

      - name: Determine ref
        id: determine-ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.source }}" = "tag" ]; then
              echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            else
              echo "ref=master" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "ref=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.determine-ref.outputs.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: yarn install
      - run: yarn test
      - run: node_modules/.bin/typedoc
      - run: cp -r coverage/lcov-report public
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build

    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
