name: Deploy Documentation Pages

on:
  workflow_run:
    types:
      - completed
    workflows:
      - Publish to NPM
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git Tag to deploy (e.g. v1.2.1)'
        type: string
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Validate tag exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          git ls-remote --tags "${{ github.server_url }}/${{ github.repository }}.git" "refs/tags/${{ inputs.tag }}" | grep -q "${{ inputs.tag }}" \
            || (echo "::error::Tag '${{ inputs.tag }}' does not exist in the repository." && exit 1)

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_branch }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: yarn install
      - run: yarn test
      - run: node_modules/.bin/typedoc
      - run: cp -r coverage/lcov-report public
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build

    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
